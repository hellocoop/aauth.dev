name = "aauth-dev"
compatibility_date = "2024-12-01"
main = "worker/index.js"

[assets]
directory = "build"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = true

[[r2_buckets]]
binding = "CONTENT"
bucket_name = "aauth-content"

# Custom domain — requires aauth.dev zone in this Cloudflare account
[[routes]]
pattern = "www.aauth.dev"
custom_domain = true
